<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Carousel</title>

<!-- Bootstrap 5 CSS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background-image: url('background.jpg');
  background-size: cover;
  background-repeat: no-repeat;
  background-attachment: fixed;
  color: rgb(22, 110, 86);
  padding: 40px 20px;
}
  .carousel-wrapper {
    max-width: 900px;
    margin: 0 auto;
  }

  .carousel-item iframe {
    width: 100%;
    height: 700px;
    border: none;
    background: #fff;
  }

  /* Make indicator buttons visible against light backgrounds */
  .carousel-indicators button {
    background-color: #333 !important;
  }

  .carousel-control-prev-icon,
  .carousel-control-next-icon {
    background-color: rgba(0,0,0,0.5);
    border-radius: 50%;
    padding: 15px;
  }

  .pdf-fallback {
    padding: 40px;
    text-align: center;
    background: #fff;
  }

#h1 {
  text-align: center;
  margin-bottom: 20px;
  color: seashell;
}
</style>
</head>
<body>



<div class="carousel-wrapper">
    <h1>IT Classes</h1>
  <div id="demo" class="carousel slide" data-bs-ride="carousel">

    <div class="carousel-indicators">
      <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="1" aria-label="Slide 2"></button>
    </div>

    <div class="carousel-inner">
      <div class="carousel-item active">

    <object
        data="Info/Computer-Science/IS-A_CT_2026.pdf#toolbar=0&navpanes=0&scrollbar=0"
        type="application/pdf"
        width="100%"
        height="100%">
        
        <p class="pdf-fallback">
            Your browser can't display this PDF.
            <a href="Info/Computer-Science/IS-A_CT_2026.pdf" target="_blank" rel="noopener">
                Open it in a new tab
            </a>.
        </p>
    </object> 
      </div>
      <div class="carousel-item">

    <object
        data="Info/Computer-Science/CSCI_AS_2026.pdf#toolbar=0&navpanes=0&scrollbar=0"
        type="application/pdf"
        width="100%"
        height="100%">
        
        <p class="pdf-fallback">
            Your browser can't display this PDF.
            <a href="Info/Computer-Science/IS-A_CT_2026.pdf" target="_blank" rel="noopener">
                Open it in a new tab
            </a>.
        </p>
    </object>
      </div>
      <!-- Add more slides as needed -->
    </div>

    <!-- Controls -->
    <button class="carousel-control-prev" type="button" data-bs-target="#demo" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#demo" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>

  </div>
</div>

<!-- Bootstrap 5 JS (required for the carousel to actually function) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>

</body>
</html>
