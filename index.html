<!-- Home page of the system. -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Board Display</title>
    <link rel="stylesheet" href="style.css">
  </head>
<body>

  <!-- Full display -->
  <div class="app">

    <!-- TOP: Time & Date -->
    <div id="clock-container">

      <div id="time">00:00:00</div>
      <div id="date">Loading date...</div>
    </div>

    <!-- Alert Bar (top) -->
    <div id="alert-bar-top" class="alert-bar">
      <div class="scroll-left">
        <h1 class="AlertBar_Text"></h1>      
      </div>
    </div>

    <!-- CENTER: Image Slideshow -->
    <div id="slideshow-container">
      <div id="slideshow">
      </div>
      

    </div>
     
    <!-- Alert Bar (bottom display) -->
    <div id="alert-bar-bot" class="alert-bar">
      <div class="scroll-left">
        <h1 class="AlertBar_Text"></h1>
      </div>
    </div>

    <!-- Slideshow Controls -->
    <div class="slideshow-controls">
      <button id="prev-slide" class="control-btn">❮</button>
      <button id="toggle-play" class="control-btn">⏸ </button>
      <button id="next-slide" class="control-btn">❯</button>      
    </div>


<!-- BOTTOM: Buttons -->
<div id="button-container">

  <!-- *********************************
       Announcements
  ********************************** -->
  <button 
    class="action-btn"
    data-title="Announcements"
    data-content="
      📣 Fall classes start on August 24th — enroll now! <br> Don’t miss the first week of lectures and syllabus updates. <br><br>

      Attention students: Starting today, the library is open until 9 PM on weekdays.<br><br> 

      Please review the campus parking map and purchase your permit.<br><br>"> 
    Announcements
  </button>

  <!-- *********************************
      Campus Resources
  ********************************** -->
  <button 
    class="action-btn"
    data-resources="true">
    Campus <br> resources
  </button>

  <!-- *********************************
       Map
  ********************************** -->
  <button 
    class="action-btn"
    data-map="true">
    Map
  </button>

  <!-- *********************************
       Tutoring
  ********************************** -->
  <button 
    class="action-btn"
    data-title="Ivy Tech 2026 Summer"
    data-content=""
    data-image="assets/QR_tutor.png">
    Tutoring
  </button>

</div> <!-- End of button Container -->

  </div> <!-- End of App div -->



<!-- Model overlay for the buttons.   --> 
<div id="modal-overlay" class="hidden">
  
    <div id="modal-box">
      
  <h2 id="modal-title">Title2</h2>
  <img id="modal-image" class="hidden" alt="">

  <p id="modal-content"></p>

  
  <!-- Resource Controls -->
    <div id="resource-controls" class="hidden">

      <div id="resource-video-wrap" class="resource-video-wrap">

      <!-- Campus Resource Image -->
      <img id="resource-image" class="hidden" alt="Campus Resource">

      <!-- Campus Resource Video -->
      <video id="resource-video" class="hidden" width="320" height="240" controls>
        <source id="resource-video-source" src="" type="video/mp4">
        Your browser does not support the video tag.
      </video>

    </div>
      

      
      <div class="resource-arrow-row">
        <button class="map-arrow-btn" id="prev-resource">❮</button>
          <button id="modal-close-resource" class="modal-close">
          Close <span class="idle-countdown"></span>
          </button>
        <button class="map-arrow-btn" id="next-resource">❯</button>
      </div>
  </div>

  <!-- Map Controls -->
   <div id="map-controls" class="hidden">
    <button class="map-arrow-btn" id="prev-map">❮</button>
      <button id="modal-close-map" class="modal-close">
        Close <span class="idle-countdown"></span>
      </button>
    <button class="map-arrow-btn" id="next-map">❯</button>
  </div>

  <!-- General Modal Close -->
  <div id="general-modal-controls">
    <button id="modal-close" class="modal-close">
      Close <span class="idle-countdown"></span>
    </button>
  </div>

  </div>
</div>

  <!-- Scripts that perform basic functionality -->
  <script src="script.js" defer></script>

  <!-- Scripts for slideshow functionality -->
  <script src="slideshow.js" defer></script>
</body>
</html>
