<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Board Display</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <!-- TOP: Time & Date -->
    <div id="clock-container">
      <div id="time">00:00:00</div>
      <div id="date">Loading date...</div>
    </div>

    <!-- CENTER: Image Slideshow -->
    <div id="slideshow-container">
      <div id="slideshow">
      </div>
    </div>

    <!-- BOTTOM: Buttons -->
    <div id="button-container">
      <button class="action-btn" data-content="This ">Announcements</button>
      <button class="action-btn" data-content="This ">Campus<br>Resources</button>
      <button class="action-btn" data-content="This ">Complection<br>Guides</button>
      <button class="action-btn" data-content="This ">Events</button>
    </div>

  </div>

  <!-- Popup Modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-box">
      <h2 id="modal-title">Title</h2>
      <p id="modal-content">Content</p>
      <button id="modal-close">Close</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
