<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Board Display</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <!-- TOP: Time & Date -->
    <div id="clock-container">
      <div id="time">00:00:00</div>
      <div id="date">Loading date...</div>
    </div>

    <!-- CENTER: Image Slideshow -->
    <div id="slideshow-container">
      <div id="slideshow">
        <!-- Slides are injected by JS -->
      </div>
    </div>

    <!-- BOTTOM: Buttons -->
    <div id="button-container">
      <button class="action-btn" data-title="Information 1" data-content="This is the popup content for button one. Replace this text with whatever info you need to show.">Button 1</button>
      <button class="action-btn" data-title="Information 2" data-content="This is the popup content for button two. Replace this text with whatever info you need to show.">Button 2</button>
      <button class="action-btn" data-title="Information 3" data-content="This is the popup content for button three. Replace this text with whatever info you need to show.">Button 3</button>
      <button class="action-btn" data-title="Information 4" data-content="This is the popup content for button four. Replace this text with whatever info you need to show.">Button 4</button>
    </div>

  </div>

  <!-- Popup Modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-box">
      <h2 id="modal-title">Title</h2>
      <p id="modal-content">Content</p>
      <button id="modal-close">Close</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
